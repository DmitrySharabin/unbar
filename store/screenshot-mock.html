<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../src/popup.css" />
<style>
	html { background: transparent; }
</style>
</head>
<body id="popup-state">
	<svg style="display: none">
		<symbol id="icon-linked" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
			stroke-linecap="round" stroke-linejoin="round">
			<path d="M9 15l6-6" />
			<path d="M11 6l.463-.536a5 5 0 017.071 7.072l-.534.464" />
			<path d="M13 18l-.397.534a5.068 5.068 0 01-7.127 0 4.972 4.972 0 010-7.071l.524-.463" />
		</symbol>
		<symbol id="icon-unlinked" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
			stroke-linecap="round" stroke-linejoin="round">
			<path d="M10 14a3.5 3.5 0 005 0l4-4a3.5 3.5 0 00-5-5l-.5.5" />
			<path d="M14 10a3.5 3.5 0 00-5 0l-4 4a3.5 3.5 0 005 5l.5-.5" />
			<line x1="16" y1="21" x2="16" y2="19" />
			<line x1="19" y1="16" x2="21" y2="16" />
			<line x1="3" y1="8" x2="5" y2="8" />
			<line x1="8" y1="3" x2="8" y2="5" />
		</symbol>
		<symbol id="icon-pencil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
			stroke-linecap="round" stroke-linejoin="round">
			<path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5Z" />
			<path d="M15 5l4 4" />
		</symbol>
		<symbol id="icon-trash" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"
			stroke-linecap="round">
			<path d="M2.5 3.5h9M5 3.5V2.5a1 1 0 011-1h2a1 1 0 011 1v1M3.5 3.5l.5 8a1 1 0 001 1h4a1 1 0 001-1l.5-8" />
		</symbol>
	</svg>

	<menu id="slots">
		<li class="row auto-row">
			<button>
				<kbd>0</kbd>
				<span class="label">1792 &times; 1117</span>
				<span class="dim">Fit screen</span>
			</button>
		</li>
		<hr class="divider">
		<li class="row">
			<button id="row-1">
				<kbd>1</kbd>
				<span class="label">1280 &times; 800</span>
				<span class="dim">16:10</span>
				<span class="star">&#9733;</span>
			</button>
			<button class="edit" id="edit-1" aria-label="Edit preset"><svg width="14" height="14"><use href="#icon-pencil"/></svg></button>
		</li>
		<li class="row">
			<button>
				<kbd>2</kbd>
				<span class="label">1920 &times; 1080</span>
				<span class="dim">Full HD</span>
			</button>
			<button class="edit" aria-label="Edit preset"><svg width="14" height="14"><use href="#icon-pencil"/></svg></button>
		</li>
		<li class="row">
			<button>
				<kbd>3</kbd>
				<span class="label">1024 &times; 768</span>
				<span class="dim">4:3</span>
			</button>
			<button class="edit" aria-label="Edit preset"><svg width="14" height="14"><use href="#icon-pencil"/></svg></button>
		</li>
		<li class="row">
			<button>
				<kbd>4</kbd>
				<span class="label">1440 &times; 900</span>
				<span class="dim">16:10</span>
			</button>
			<button class="edit" aria-label="Edit preset"><svg width="14" height="14"><use href="#icon-pencil"/></svg></button>
		</li>
		<li class="row empty-slot">
			<button>
				<kbd>5</kbd>
				<span class="label">Add preset…</span>
			</button>
		</li>
	</menu>

	<!-- Editor state (hidden by default, shown via JS below) -->
	<menu id="slots-editor" style="display: none">
		<li class="row auto-row">
			<button>
				<kbd>0</kbd>
				<span class="label">1792 &times; 1117</span>
				<span class="dim">Fit screen</span>
			</button>
		</li>
		<hr class="divider">
		<li>
			<form class="editor">
				<div class="sizes">
					<kbd>1</kbd>
					<input type="number" name="width" value="1280" placeholder="1920" aria-label="Width" min="200" required>
					<button type="button" class="chain" aria-pressed="true">
						<svg class="linked" width="16" height="16"><use href="#icon-linked"/></svg>
						<svg class="unlinked" width="16" height="16"><use href="#icon-unlinked"/></svg>
					</button>
					<input type="number" name="height" value="800" placeholder="1080" aria-label="Height" min="200" required>
					<output id="ratio">16:10</output>
				</div>
				<label>
					<input type="text" name="label" value="16:10" placeholder="e.g. Full HD" aria-label="Label" maxlength="20">
				</label>
				<footer>
					<button type="submit" class="save">Save</button>
					<button type="button" class="cancel">Cancel</button>
					<button type="button" class="remove" title="Remove this preset"><svg width="14" height="14"><use href="#icon-trash"/></svg></button>
				</footer>
			</form>
		</li>
		<li class="row">
			<button>
				<kbd>2</kbd>
				<span class="label">1920 &times; 1080</span>
				<span class="dim">Full HD</span>
			</button>
			<button class="edit" aria-label="Edit preset"><svg width="14" height="14"><use href="#icon-pencil"/></svg></button>
		</li>
		<li class="row">
			<button>
				<kbd>3</kbd>
				<span class="label">1024 &times; 768</span>
				<span class="dim">4:3</span>
			</button>
			<button class="edit" aria-label="Edit preset"><svg width="14" height="14"><use href="#icon-pencil"/></svg></button>
		</li>
		<li class="row">
			<button>
				<kbd>4</kbd>
				<span class="label">1440 &times; 900</span>
				<span class="dim">16:10</span>
			</button>
			<button class="edit" aria-label="Edit preset"><svg width="14" height="14"><use href="#icon-pencil"/></svg></button>
		</li>
	</menu>

	<p class="hint">⇧⌘U for instant unbar</p>

	<script>
		const params = new URLSearchParams(location.search);
		const state = params.get("state");

		if (state === "editor") {
			document.getElementById("slots").style.display = "none";
			document.getElementById("slots-editor").style.display = "";
		}
	</script>
</body>
</html>
